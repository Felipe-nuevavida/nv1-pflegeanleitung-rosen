<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Vida - Installation Guide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: white;
            color: #222;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
        }

        /* SCREEN 1: INTRO */
        .intro-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            gap: 4rem;
            animation: fadeIn 0.3s ease-in;
        }

        .logo-placeholder {
            width: 120px;
            height: 120px;
            background: #f5f5f5;
            border: 2px solid #ddd;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #999;
        }

        .language-buttons {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 2rem;
        }

        .lang-btn {
            width: 70px;
            height: 70px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 12px;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lang-btn:hover {
            border-color: #999;
            transform: scale(1.08);
        }

        .lang-btn:active {
            transform: scale(0.95);
        }

        /* SCREEN 2: CAROUSEL */
        .carousel-screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            background: white;
            animation: slideIn 0.4s ease-out;
        }

        .carousel-screen.active {
            display: flex;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: #f0f0f0;
            display: flex;
            gap: 0;
            padding: 0;
        }

        .progress-segment {
            flex: 1;
            height: 100%;
            background: #ddd;
            transition: background 0.3s ease;
        }

        .progress-segment.active {
            background: #d4a574;
            animation: fillProgress 5s linear forwards;
        }

        @keyframes fillProgress {
            from {
                background: #ddd;
            }
            to {
                background: #d4a574;
            }
        }

        .carousel-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .slide {
            display: none;
            text-align: center;
            width: 100%;
            animation: slideContent 0.4s ease;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .slide.active {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            opacity: 1;
        }

        .slide h2 {
            font-size: 2rem;
            font-weight: 600;
            color: #222;
            margin-bottom: 0.5rem;
        }

        .slide p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 0.5rem;
        }

        .slide .warning {
            font-size: 1rem;
            color: #c41e3a;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        /* TAP ZONES */
        .tap-zone-left, .tap-zone-right {
            position: absolute;
            top: 0;
            width: 20%;
            height: 100%;
            cursor: pointer;
            z-index: 10;
        }

        .tap-zone-left {
            left: 0;
        }

        .tap-zone-right {
            right: 0;
        }

        /* SUPPORT BUTTON */
        .support-button {
            padding: 1rem 2rem;
            font-size: 1rem;
            background: white;
            color: #222;
            border: 2px solid #222;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .support-button:hover {
            background: #222;
            color: white;
        }

        .support-button:active {
            transform: scale(0.98);
        }

        .final-message {
            font-size: 1.8rem;
            font-weight: 600;
            color: #222;
            margin-bottom: 2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideContent {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .carousel-footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.9rem;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- INTRO SCREEN -->
        <div class="intro-screen" id="introScreen">
            <div class="logo-placeholder">🎁</div>
            <div class="language-buttons">
                <button class="lang-btn" onclick="startCarousel('de')">🇩🇪</button>
                <button class="lang-btn" onclick="startCarousel('en')">🇬🇧</button>
                <button class="lang-btn" onclick="startCarousel('fr')">🇫🇷</button>
                <button class="lang-btn" onclick="startCarousel('es')">🇪🇸</button>
                <button class="lang-btn" onclick="startCarousel('it')">🇮🇹</button>
            </div>
        </div>

        <!-- CAROUSEL SCREEN -->
        <div class="carousel-screen" id="carouselScreen">
            <div class="progress-bar-container" id="progressBar">
                <div class="progress-segment active" id="seg0"></div>
                <div class="progress-segment" id="seg1"></div>
                <div class="progress-segment" id="seg2"></div>
                <div class="progress-segment" id="seg3"></div>
            </div>

            <div class="carousel-content">
                <div class="tap-zone-left" onclick="prevSlide()"></div>

                <!-- Slides will be inserted here -->
                <div id="slidesContainer"></div>

                <div class="tap-zone-right" onclick="nextSlide()"></div>
            </div>

            <div class="carousel-footer" id="carouselFooter"></div>
        </div>
    </div>

    <script>
        const content = {
            de: [
                { title: 'HAUBE REINIGEN 🧼', text: 'Fläche staub- und fettfrei machen.', warning: '❗️ KEIN WACHS! KEINE POLITUR!' },
                { title: 'VAKUUM & SICHERN ✋', text: 'Saugnäpfe leicht anfeuchten. Direkt auf den Saugnapf drücken, NIEMALS auf die Blüte! Bänder am Kühlergrill/Spiegel festknoten.', warning: '' },
                { title: 'SICHER ENTFERNEN 🔓', text: 'Zum Abnehmen NUR an der kleinen Lasche ziehen.', warning: '❗️ NIEMALS an der Blume reißen!' },
                { title: 'GUTE FAHRT! 🚗💨', text: '', warning: '❗️ MAX. 80 KM/H (Keine Autobahn)', isFinal: true }
            ],
            en: [
                { title: 'CLEAN THE HOOD 🧼', text: 'Surface must be completely dust and grease-free.', warning: '❗️ NO WAX! NO POLISH!' },
                { title: 'PRESS & SECURE ✋', text: 'Moisten suction cups slightly. Press the suction cup directly, NEVER press the flower! Tie ribbons securely to the grille/mirrors.', warning: '' },
                { title: 'SAFE REMOVAL 🔓', text: 'To remove, pull ONLY the small tab on the suction cup.', warning: '❗️ NEVER rip the flower off!' },
                { title: 'HAVE A GREAT DRIVE! 🚗💨', text: '', warning: '❗️ MAX. 80 KM/H (No highways)', isFinal: true }
            ],
            fr: [
                { title: 'NETTOYER LE CAPOT 🧼', text: 'La surface doit être sans poussière ni graisse.', warning: '❗️ PAS DE CIRE ! PAS DE POLISH !' },
                { title: 'PRESSER & SÉCURISER ✋', text: 'Humidifiez légèrement les ventouses. Appuyez directement sur la ventouse, JAMAIS sur la fleur ! Nouez les rubans fermement à la calandre/rétroviseurs.', warning: '' },
                { title: 'RETRAIT SÉCURISÉ 🔓', text: 'Pour retirer, tirez UNIQUEMENT sur la petite languette de la ventouse.', warning: '❗️ NE JAMAIS arracher la fleur !' },
                { title: 'BONNE ROUTE ! 🚗💨', text: '', warning: '❗️ MAX. 80 KM/H (Pas d\'autoroute)', isFinal: true }
            ],
            es: [
                { title: 'LIMPIAR EL CAPÓ 🧼', text: 'La superficie debe estar sin polvo ni grasa.', warning: '❗️ ¡CERO CERA! ¡CERO PULIMIENTO!' },
                { title: 'PRESIONAR Y ASEGURAR ✋', text: 'Humedezca ligeramente las ventosas. Presione directamente la ventosa, ¡NUNCA la flor! Ate las cintas firmemente a la parrilla/espejos.', warning: '' },
                { title: 'RETIRADA SEGURA 🔓', text: 'Para quitar, tire SOLO de la pequeña lengüeta de la ventosa.', warning: '❗️ ¡NUNCA arranque la flor!' },
                { title: '¡BUEN VIAJE! 🚗💨', text: '', warning: '❗️ MÁX. 80 KM/H (No autopistas)', isFinal: true }
            ],
            it: [
                { title: 'PULIRE IL COFANO 🧼', text: 'La superficie deve essere senza polvere e grasso.', warning: '❗️ NIENTE CERA! NIENTE LUCIDO!' },
                { title: 'PREMERE E FISSARE ✋', text: 'Inumidire leggermente le ventose. Premere direttamente la ventosa, MAI il fiore! Legare saldamente i nastri alla griglia/specchietti.', warning: '' },
                { title: 'RIMOZIONE SICURA 🔓', text: 'Per rimuovere, tirare SOLO la piccola linguetta della ventosa.', warning: '❗️ MAI strappare il fiore!' },
                { title: 'BUON VIAGGIO! 🚗💨', text: '', warning: '❗️ MAX. 80 KM/H (No autostrade)', isFinal: true }
            ]
        };

        const supportText = {
            de: 'Support kontaktieren',
            en: 'Contact Support',
            fr: 'Contacter le Support',
            es: 'Contactar Soporte',
            it: 'Contatta il Supporto'
        };

        let currentLang = 'de';
        let currentSlide = 0;
        let autoAdvanceTimer = null;
        let progressTimer = null;

        function startCarousel(lang) {
            currentLang = lang;
            currentSlide = 0;

            document.getElementById('introScreen').style.display = 'none';
            document.getElementById('carouselScreen').classList.add('active');

            renderSlides();
            showSlide(0);
            startAutoAdvance();
        }

        function renderSlides() {
            const container = document.getElementById('slidesContainer');
            container.innerHTML = '';

            content[currentLang].forEach((slide, index) => {
                const slideEl = document.createElement('div');
                slideEl.className = 'slide';
                if (index === 0) slideEl.classList.add('active');

                if (slide.isFinal) {
                    slideEl.innerHTML = `
                        <div class="final-message">${slide.title}</div>
                        <p class="warning">${slide.warning}</p>
                        <a href="mailto:info@nuevavida-ftv.de" class="support-button">${supportText[currentLang]}</a>
                    `;
                } else {
                    slideEl.innerHTML = `
                        <h2>${slide.title}</h2>
                        ${slide.text ? `<p>${slide.text}</p>` : ''}
                        ${slide.warning ? `<p class="warning">${slide.warning}</p>` : ''}
                    `;
                }

                container.appendChild(slideEl);
            });
        }

        function showSlide(index) {
            const slides = document.querySelectorAll('.slide');
            slides.forEach(s => s.classList.remove('active'));
            if (slides[index]) {
                slides[index].classList.add('active');
            }

            updateProgressBar(index);
        }

        function updateProgressBar(index) {
            const segments = document.querySelectorAll('.progress-segment');
            segments.forEach((seg, i) => {
                seg.classList.remove('active');
            });
            if (segments[index]) {
                segments[index].classList.add('active');
            }
        }

        function nextSlide() {
            if (currentSlide < content[currentLang].length - 1) {
                currentSlide++;
                showSlide(currentSlide);
                if (currentSlide === content[currentLang].length - 1) {
                    stopAutoAdvance();
                } else {
                    resetAutoAdvance();
                }
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                showSlide(currentSlide);
                resetAutoAdvance();
            }
        }

        function startAutoAdvance() {
            if (currentSlide < content[currentLang].length - 1) {
                autoAdvanceTimer = setTimeout(() => {
                    nextSlide();
                    startAutoAdvance();
                }, 5000);
            }
        }

        function resetAutoAdvance() {
            clearTimeout(autoAdvanceTimer);
            startAutoAdvance();
        }

        function stopAutoAdvance() {
            clearTimeout(autoAdvanceTimer);
        }
    </script>
</body>
</html>
