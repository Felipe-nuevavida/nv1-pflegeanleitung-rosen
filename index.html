<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva Vida - Installation Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #FCFBF9;
      color: #2A2A2A;
      overflow: hidden;
    }

    .wrap { width:100%; height:100vh; display:flex; flex-direction:column; }

    /* ========== INTRO SCREEN ========== */
    .intro {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      gap: 3rem;
      background: #FCFBF9;
      padding: 2rem 1.5rem;
    }

    .logo-img {
      width: 200px;
      height: 200px;
      object-fit: contain;
      animation: logoFloat 3s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px); opacity: 0.95; }
      50% { transform: translateY(-12px); opacity: 1; }
    }

    .lang-row {
      display: flex;
      gap: 1.8rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 1rem;
    }

    .lang-btn {
      width: 90px;
      height: 90px;
      border: none;
      background: #fff;
      border-radius: 50%;
      font-size: 2.8rem;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(212, 160, 23, 0.12);
      position: relative;
      overflow: hidden;
    }

    .lang-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(212, 160, 23, 0.08) 0%, rgba(245, 216, 122, 0.06) 100%);
      transition: left 0.35s ease;
      z-index: -1;
    }

    .lang-btn:hover {
      transform: scale(1.12);
      box-shadow: 0 12px 28px rgba(212, 160, 23, 0.22);
    }

    .lang-btn:hover::before {
      left: 0;
    }

    .lang-btn:active {
      transform: scale(0.96);
    }

    /* ========== CAR SCREEN ========== */
    .car-screen {
      display: none;
      flex-direction: column;
      width: 100%;
      height: 100%;
      background: #FCFBF9;
    }

    .car-screen.active {
      display: flex;
    }

    /* ========== PROGRESS BAR ========== */
    .prog-bar {
      width: 100%;
      height: 2px;
      background: #E8E5E0;
      display: flex;
      flex-shrink: 0;
      gap: 4px;
    }

    .seg {
      flex: 1;
      height: 100%;
      background: #E8E5E0;
      transition: background 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .seg.done {
      background: linear-gradient(90deg, #C8A415 0%, #D4B73F 100%);
    }

    .seg.current {
      background: linear-gradient(90deg, #D4A017 0%, #F5D87A 50%, #C8A415 100%);
      box-shadow: 0 0 12px rgba(212, 160, 23, 0.4);
    }

    /* ========== CONTENT AREA ========== */
    .car-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 1.2rem 1.5rem 0.5rem 1.5rem;
      position: relative;
      overflow: hidden;
      width: 100%;
      gap: 0.5rem;
    }

    .tap-l, .tap-r {
      position: absolute;
      top: 0;
      width: 18%;
      height: 100%;
      cursor: pointer;
      z-index: 10;
    }

    .tap-l { left: 0; }
    .tap-r { right: 0; }

    /* ========== SLIDES ========== */
    .slide {
      display: none;
      text-align: center;
      width: 100%;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 0;
      animation: slideEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .slide.active {
      display: flex;
    }

    @keyframes slideEnter {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ========== STEP NUMBER ========== */
    .step-num {
      font-family: 'Playfair Display', serif;
      font-size: 8.5rem;
      font-weight: 900;
      line-height: 0.85;
      background: linear-gradient(135deg, #A07810 0%, #C8A415 35%, #F5D87A 55%, #C8A415 75%, #8B6914 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .divider {
      width: 85px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #C8A415 20%, #F5D87A 50%, #C8A415 80%, transparent);
      border-radius: 2px;
      box-shadow: 0 2px 6px rgba(212, 160, 23, 0.2);
      margin: 0.1rem 0;
    }

    /* ========== TEXT ========== */
    .slide h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.95rem;
      font-weight: 900;
      color: #2A2A2A;
      line-height: 1.15;
      letter-spacing: -0.01em;
      margin: 0.1rem 0 0;
      max-width: 340px;
    }

    .slide p {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.15rem;
      line-height: 1.7;
      color: #555555;
      max-width: 380px;
      font-weight: 400;
      letter-spacing: 0.3px;
      margin: 0.1rem 0 0;
    }

    /* ========== WARNING BOX ========== */
    .warn {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.1rem;
      color: #8B4513;
      font-weight: 700;
      background: #FFF8F3;
      border: none;
      border-left: 4px solid #D4A017;
      padding: 0.85rem 1.4rem;
      border-radius: 4px;
      display: inline-block;
      letter-spacing: 0.2px;
      box-shadow: 0 4px 12px rgba(212, 160, 23, 0.08);
      max-width: 380px;
      margin: 0.1rem 0 0;
    }

    /* ========== LOGO SMALL ========== */
    .logo-small {
      position: relative;
      width: 280px;
      height: 280px;
      object-fit: contain;
      opacity: 0.9;
      z-index: 5;
      pointer-events: none;
      margin: 0 auto 0.2rem;
    }

    /* ========== FINAL SCREEN ========== */
    .final-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 900;
      color: #2A2A2A;
      line-height: 1.15;
      letter-spacing: -0.01em;
      max-width: 340px;
      margin: 0.1rem 0 0;
    }

    /* ========== SUPPORT BUTTON ========== */
    .support-btn {
      padding: 1.1rem 2.8rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 1.05rem;
      font-weight: 800;
      background: linear-gradient(135deg, #D4A017 0%, #F5D87A 45%, #C8A415 100%);
      color: #fff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.08em;
      box-shadow: 0 6px 20px rgba(212, 160, 23, 0.28);
      text-decoration: none;
      display: inline-block;
      transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      margin-top: 0.1rem;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }

    .support-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.15);
      transition: left 0.35s ease;
      z-index: -1;
    }

    .support-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(212, 160, 23, 0.38);
    }

    .support-btn:hover::before {
      left: 0;
    }

    .support-btn:active {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(212, 160, 23, 0.25);
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 380px) {
      .intro {
        gap: 2.2rem;
      }

      .logo-img {
        width: 160px;
        height: 160px;
      }

      .lang-row {
        gap: 1.4rem;
      }

      .lang-btn {
        width: 80px;
        height: 80px;
        font-size: 2.4rem;
      }

      .step-num {
        font-size: 7.5rem;
      }

      .slide h2 {
        font-size: 1.75rem;
      }

      .slide p {
        font-size: 1.05rem;
      }

      .final-title {
        font-size: 2.1rem;
      }

      .support-btn {
        padding: 0.95rem 2.2rem;
        font-size: 0.95rem;
      }
    }

    @media (max-width: 320px) {
      .step-num {
        font-size: 6.5rem;
      }

      .slide h2 {
        font-size: 1.55rem;
      }

      .divider {
        width: 70px;
      }

      .warn {
        font-size: 1rem;
        padding: 0.85rem 1.2rem;
      }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="intro" id="introScreen">
    <img src="Logo_gold.png" class="logo-img" alt="Nueva Vida" onerror="this.style.display='none'">
    <div class="lang-row">
      <button class="lang-btn" onclick="go('de')">🇩🇪</button>
      <button class="lang-btn" onclick="go('en')">🇬🇧</button>
      <button class="lang-btn" onclick="go('fr')">🇫🇷</button>
      <button class="lang-btn" onclick="go('es')">🇪🇸</button>
      <button class="lang-btn" onclick="go('it')">🇮🇹</button>
    </div>
  </div>

  <div class="car-screen" id="carScreen">
    <div class="prog-bar">
      <div class="seg current" id="s0"></div>
      <div class="seg" id="s1"></div>
      <div class="seg" id="s2"></div>
      <div class="seg" id="s3"></div>
    </div>
    <div class="car-content">
      <div class="tap-l" onclick="prev()"></div>
      <img src="Logo_gold.png" class="logo-small" alt="" onerror="this.style.display='none'">
      <div id="slides" style="width:100%"></div>
      <div class="tap-r" onclick="next()"></div>
    </div>
  </div>
</div>

<script>
const C={
  de:[
    {n:'1',t:'HAUBE REINIGEN 🧼',b:'Fläche staub- und fettfrei machen.',w:'❗ KEIN WACHS! KEINE POLITUR!'},
    {n:'2',t:'VAKUUM DRÜCKEN ✋',b:'Saugnäpfe leicht anfeuchten. Direkt auf den Saugnapf drücken – NIEMALS auf die Blüte!',w:''},
    {n:'3',t:'SICHER ENTFERNEN 🔓',b:'Zum Abnehmen NUR an der kleinen Lasche ziehen.',w:'❗ NIEMALS an der Blume reißen!'},
    {n:'4',t:'GUTE FAHRT! 🚗💨',b:'',w:'❗ MAX. 80 KM/H',f:1}
  ],
  en:[
    {n:'1',t:'CLEAN THE HOOD 🧼',b:'Surface must be completely dust and grease-free.',w:'❗ NO WAX! NO POLISH!'},
    {n:'2',t:'PRESS & SECURE ✋',b:'Moisten suction cups slightly. Press the suction cup directly – NEVER press the flower!',w:''},
    {n:'3',t:'SAFE REMOVAL 🔓',b:'To remove, pull ONLY the small tab on the suction cup.',w:'❗ NEVER rip the flower off!'},
    {n:'4',t:'HAVE A GREAT DRIVE! 🚗💨',b:'',w:'❗ MAX. 80 KM/H',f:1}
  ],
  fr:[
    {n:'1',t:'NETTOYER LE CAPOT 🧼',b:'La surface doit être sans poussière ni graisse.',w:'❗ PAS DE CIRE ! PAS DE POLISH !'},
    {n:'2',t:'PRESSER LA VENTOUSE ✋',b:'Humidifiez légèrement les ventouses. Appuyez directement sur la ventouse, JAMAIS sur la fleur !',w:''},
    {n:'3',t:'RETRAIT SÉCURISÉ 🔓',b:'Pour retirer, tirez UNIQUEMENT sur la petite languette.',w:'❗ NE JAMAIS arracher la fleur !'},
    {n:'4',t:'BONNE ROUTE ! 🚗💨',b:'',w:'❗ MAX. 80 KM/H',f:1}
  ],
  es:[
    {n:'1',t:'LIMPIAR EL CAPÓ 🧼',b:'La superficie debe estar sin polvo ni grasa.',w:'❗ ¡CERO CERA! ¡CERO PULIMIENTO!'},
    {n:'2',t:'PRESIONAR LA VENTOSA ✋',b:'Humedezca ligeramente las ventosas. Presione directamente la ventosa, ¡NUNCA la flor!',w:''},
    {n:'3',t:'RETIRADA SEGURA 🔓',b:'Para quitar, tire SOLO de la pequeña lengüeta.',w:'❗ ¡NUNCA arranque la flor!'},
    {n:'4',t:'¡BUEN VIAJE! 🚗💨',b:'',w:'❗ MÁX. 80 KM/H',f:1}
  ],
  it:[
    {n:'1',t:'PULIRE IL COFANO 🧼',b:'La superficie deve essere senza polvere e grasso.',w:'❗ NIENTE CERA! NIENTE LUCIDO!'},
    {n:'2',t:'PREMERE LA VENTOSA ✋',b:'Inumidire leggermente le ventose. Premere direttamente la ventosa, MAI il fiore!',w:''},
    {n:'3',t:'RIMOZIONE SICURA 🔓',b:'Per rimuovere, tirare SOLO la piccola linguetta.',w:'❗ MAI strappare il fiore!'},
    {n:'4',t:'BUON VIAGGIO! 🚗💨',b:'',w:'❗ MAX. 80 KM/H',f:1}
  ]
};
const ST={de:'Support kontaktieren',en:'Contact Support',fr:'Contacter le Support',es:'Contactar Soporte',it:'Contatta il Supporto'};
let lang='de',cur=0,timer=null;

function go(l){
  lang=l; cur=0;
  document.getElementById('introScreen').style.display='none';
  document.getElementById('carScreen').classList.add('active');
  render(); show(0); adv();
}
function render(){
  const c=document.getElementById('slides'); c.innerHTML='';
  C[lang].forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='slide'+(i===0?' active':'');
    if(s.f){
      d.innerHTML=`<div class="step-num">${s.n}</div><div class="divider"></div><div class="final-title">${s.t}</div>${s.w?`<div class="warn">${s.w}</div>`:''}<a href="mailto:info@nuevavida-ftv.de" class="support-btn">${ST[lang]}</a>`;
    } else {
      d.innerHTML=`<div class="step-num">${s.n}</div><div class="divider"></div><h2>${s.t}</h2>${s.b?`<p>${s.b}</p>`:''}${s.w?`<div class="warn">${s.w}</div>`:''}`;
    }
    c.appendChild(d);
  });
}
function show(i){
  document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.seg').forEach((s,j)=>{
    s.classList.remove('current','done');
    if(j<i) s.classList.add('done'); else if(j===i) s.classList.add('current');
  });
  document.querySelectorAll('.slide')[i]?.classList.add('active');
}
function next(){if(cur<C[lang].length-1){cur++;show(cur);cur<C[lang].length-1?resetAdv():clearTimeout(timer);}}
function prev(){if(cur>0){cur--;show(cur);resetAdv();}}
function adv(){if(cur<C[lang].length-1)timer=setTimeout(()=>{next();adv();},5000);}
function resetAdv(){clearTimeout(timer);adv();}
</script>
</body>
</html>
