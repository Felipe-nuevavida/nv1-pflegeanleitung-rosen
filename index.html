<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva Vida - Installation Guide</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background:#fff; overflow:hidden; user-select: none; -webkit-user-select: none; }
    .wrap { width:100%; height:100vh; display:flex; flex-direction:column; }

    .intro { display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%; gap:2.5rem; background:#fff; }
    .logo-img { width:220px; height:220px; object-fit:contain; }
    .lang-row { display:flex; gap:1.2rem; flex-wrap:wrap; justify-content:center; padding:0 1rem; }
    .lang-btn {
      width:95px; height:95px; border:2px solid #d4a017; background:#fff;
      border-radius:14px; font-size:3.2rem; cursor:pointer;
      transition:all 0.2s; display:flex; align-items:center; justify-content:center;
      box-shadow:0 2px 8px rgba(212,160,23,0.2);
    }
    .lang-btn:hover { border-color:#b8860b; transform:scale(1.08); }
    .lang-btn:active { transform:scale(0.95); }

    .car-screen { display:none; flex-direction:column; width:100%; height:100%; background:#fff; position:relative; }
    .car-screen.active { display:flex; }

    .prog-bar { width:100%; height:4px; display:flex; gap:6px; padding:12px 12px 0 12px; flex-shrink:0; z-index:20; }
    .seg { flex:1; height:100%; background:rgba(212,160,23,0.25); border-radius:4px; overflow:hidden; }
    .fill { height:100%; width:0%; background:#d4a017; border-radius:4px; }
    
    .seg.done .fill { width:100%; }
    .seg.current .fill { animation: fillUp 8s linear forwards; }
    .is-paused .seg.current .fill { animation-play-state: paused; }
    
    @keyframes fillUp { from { width:0%; } to { width:100%; } }

    .car-content {
      flex:1; display:flex; align-items:flex-start; justify-content:center;
      padding:1rem 1.5rem; position:relative; overflow:hidden;
    }

    .tap-l, .tap-r { position:absolute; top:0; height:100%; cursor:pointer; z-index:10; }
    .tap-l { left:0; width:25%; }
    .tap-r { right:0; width:75%; }

    .slide { display:none; text-align:center; width:100%; flex-direction:column; align-items:center; gap:0.85rem; padding-top:0.5rem; animation:fadeSlide 0.3s ease; }
    .slide.active { display:flex; }
    @keyframes fadeSlide { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .step-num {
      font-size:8rem; font-weight:900; line-height:0.9;
      background:linear-gradient(135deg,#c8a415 0%,#f5d87a 45%,#a07810 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      font-family:Georgia,serif;
    }
    .divider { width:70px; height:3px; background:linear-gradient(90deg,#c8a415,#f0c93a,#c8a415); border-radius:2px; }
    .slide h2 { font-size:1.9rem; font-weight:800; color:#1a1a1a; line-height:1.2; }
    .slide p { font-size:1.25rem; line-height:1.5; color:#333; max-width:420px; }
    .warn { font-size:1.15rem; color:#b91c1c; font-weight:800; background:#fff1f1; border:2px solid #f5c6c6; padding:0.65rem 1.2rem; border-radius:10px; display:inline-block; }

    .logo-small { position:absolute; top:15px; right:14px; width:56px; height:56px; object-fit:contain; opacity:0.75; z-index:5; pointer-events:none; }

    .final-title { font-size:2.4rem; font-weight:900; color:#1a1a1a; line-height:1.2; }
    .final-msg { font-size:1.3rem; font-weight:600; color:#1a1a1a; line-height:1.6; max-width:420px; margin-top:0.5rem; }
    .support-btn {
      padding:1rem 2.5rem; font-size:1.2rem;
      background:linear-gradient(135deg,#c8a415,#f0c93a,#a07810);
      color:#fff; border:none; border-radius:12px; cursor:pointer;
      font-weight:800; letter-spacing:0.03em;
      box-shadow:0 2px 12px rgba(180,130,0,0.4);
      text-decoration:none; display:inline-block; transition:all 0.2s;
      margin-top:1rem; position:relative; z-index:30;
    }
    .support-btn:hover { transform:scale(1.04); }
    .support-btn:active { transform:scale(0.97); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="intro" id="introScreen">
    <img src="Logo_gold.png" class="logo-img" alt="Nueva Vida" onerror="this.style.display='none'">
    <div class="lang-row">
      <button class="lang-btn" onclick="go('de')">🇩🇪</button>
      <button class="lang-btn" onclick="go('en')">🇬🇧</button>
      <button class="lang-btn" onclick="go('fr')">🇫🇷</button>
      <button class="lang-btn" onclick="go('es')">🇪🇸</button>
      <button class="lang-btn" onclick="go('it')">🇮🇹</button>
    </div>
  </div>

  <div class="car-screen" id="carScreen">
    <div class="prog-bar" id="progBar"></div>
    <div class="car-content">
      <div class="tap-l" onclick="prev()"></div>
      <img src="Logo_gold.png" class="logo-small" alt="" onerror="this.style.display='none'">
      <div id="slides" style="width:100%"></div>
      <div class="tap-r" onclick="next()"></div>
    </div>
  </div>
</div>

<script>

  de:[
    {n:'1',t:'BASE PARA LA PERFECCIÓN 🧼',b:'Limpia y seca bien el capó con amor. Para que nuestras rosas descansen seguras, la superficie debe estar libre de polvo, suciedad y grasa. Este es el primer paso hacia la magia.',w:'❗ VITAL: ¡CERO CERA O PULIMENTO! Detiene el vacío.'},
    {n:'2',t:'VUESTRO MASTERPIECE 🎀',b:'Coloca la guirnalda sobre el coche antes de fijarla. Juega, busca la forma ideal: en V, asimétrica, curva... Este es tu momento para crear. Cada ángulo cuenta en vuestra historia.',w:''},
    {n:'3',t:'FIJACIÓN CON PRECISIÓN ✋',b:'Humedece apenas el interior de las ventosas. Presiona con confianza el centro de cada una: activarás el vacío que te sostiene. Firmeza, no brutalidad. El resultado: seguridad total que respeta tu coche.',w:'❗ SOLO LA VENTOSA. Las flores son delicadas como vuestra emoción.'},
    {n:'4',t:'ADIÓS SIN RASTRO 🔓',b:'Cuando termine la magia, levanta suavemente la lengüeta transparente. El vacío cede al instante. Ni un rasguño, ni una marca. Vuestro coche brilla como al inicio, pero con un recuerdo imborrable.',w:'❗ NUNCA jales la flor ni el tallo. La perfección no deja heridas.'},
    {n:'5',t:'¡VIVID CADA INSTANTE! 🚗💨',b:'Todo está listo. Vosotros brillas. Las rosas brillan. El coche brilla. Conducid seguros, sonreíd sin parar, y guardad este momento para siempre. Nueva Vida está en vuestro corazón.',w:'❗ MÁXIMO 80 KM/H – LA SEGURIDAD ES AMOR',f:1}
  ],
  en:[
    {n:'1',t:'BASE FOR PERFECTION 🧼',b:'Thoroughly clean and dry the hood with care. For our roses to rest securely, the surface must be dust-, dirt-, and grease-free. This is your first step toward magic.',w:'❗ CRITICAL: NO WAX OR POLISH! It blocks the vacuum.'},
    {n:'2',t:'YOUR MASTERPIECE 🎀',b:'Place the garland on the car before securing it. Play, explore the ideal shape: V-form, asymmetrical, curved... This is your moment to create. Every angle matters in your story.',w:''},
    {n:'3',t:'SECURE WITH PRECISION ✋',b:'Slightly moisten the inside of the suction cups. Press confidently at the center of each one: you\'ll activate the vacuum that holds you steady. Firmness, not force. The result: total security that respects your car.',w:'❗ ONLY THE CUP. The flowers are as delicate as your emotions.'},
    {n:'4',t:'GOODBYE WITHOUT A TRACE 🔓',b:'When the magic ends, gently lift the transparent tab. The vacuum releases instantly. Not a scratch, not a mark. Your car shines like new, but now carries an unforgettable memory.',w:'❗ NEVER pull the flower or stem. Perfection leaves no wounds.'},
    {n:'5',t:'LIVE EVERY SECOND! 🚗💨',b:'Everything is ready. You shine. The roses shine. Your car shines. Drive safely, smile endlessly, and keep this moment forever. Nueva Vida is in your heart.',w:'❗ MAXIMUM 80 KM/H – SAFETY IS LOVE',f:1}
  ],
  fr:[
    {n:'1',t:'BASE DE LA PERFECTION 🧼',b:'Nettoyez et séchez le capot avec amour. Pour que nos roses reposent en sécurité, la surface doit être libre de poussière, saleté et graisse. Voilà votre premier pas vers la magie.',w:'❗ ESSENTIEL : NI CIRE NI POLISH ! Cela bloque le vide.'},
    {n:'2',t:'VOTRE CHEF-D\'ŒUVRE 🎀',b:'Placez la guirlande sur la voiture avant de la fixer. Explorez, trouvez la forme idéale : en V, asymétrique, courbe... C\'est votre moment pour créer. Chaque angle compte dans votre histoire.',w:''},
    {n:'3',t:'FIXATION AVEC PRÉCISION ✋',b:'Humidifiez légèrement l\'intérieur des ventouses. Appuyez avec confiance au centre de chacune : vous activerez le vide qui vous soutient. Fermeté, pas brutalité. Résultat : sécurité totale qui respecte votre auto.',w:'❗ UNIQUEMENT LA VENTOUSE. Les fleurs sont aussi délicates que vos émotions.'},
    {n:'4',t:'AU REVOIR SANS TRACES 🔓',b:'Quand la magie s\'achève, levez doucement la languette transparente. Le vide s\'échappe à l\'instant. Pas une rayure, pas une marque. Votre auto brille comme neuve, portant maintenant un souvenir gravé.',w:'❗ NE TIREZ JAMAIS sur la fleur ou la tige. La perfection ne blesse pas.'},
    {n:'5',t:'VIVEZ CHAQUE INSTANT ! 🚗💨',b:'Tout est prêt. Vous brillez. Les roses brillent. Votre voiture brille. Conduisez prudemment, souriez sans fin, et gardez ce moment à jamais. Nueva Vida est dans votre cœur.',w:'❗ MAXIMUM 80 KM/H – LA SÉCURITÉ EST L\'AMOUR',f:1}
  ],
  es:[
    {n:'1',t:'BASE PARA LA PERFECCIÓN 🧼',b:'Limpia y seca bien el capó con amor. Para que nuestras rosas descansen seguras, la superficie debe estar libre de polvo, suciedad y grasa. Este es el primer paso hacia la magia.',w:'❗ VITAL: ¡CERO CERA O PULIMENTO! Detiene el vacío.'},
    {n:'2',t:'VUESTRO MASTERPIECE 🎀',b:'Coloca la guirnalda sobre el coche antes de fijarla. Juega, busca la forma ideal: en V, asimétrica, curva... Este es tu momento para crear. Cada ángulo cuenta en vuestra historia.',w:''},
    {n:'3',t:'FIJACIÓN CON PRECISIÓN ✋',b:'Humedece apenas el interior de las ventosas. Presiona con confianza el centro de cada una: activarás el vacío que te sostiene. Firmeza, no brutalidad. El resultado: seguridad total que respeta tu coche.',w:'❗ SOLO LA VENTOSA. Las flores son delicadas como vuestra emoción.'},
    {n:'4',t:'ADIÓS SIN RASTRO 🔓',b:'Cuando termine la magia, levanta suavemente la lengüeta transparente. El vacío cede al instante. Ni un rasguño, ni una marca. Vuestro coche brilla como al inicio, pero con un recuerdo imborrable.',w:'❗ NUNCA jales la flor ni el tallo. La perfección no deja heridas.'},
    {n:'5',t:'¡VIVID CADA INSTANTE! 🚗💨',b:'Todo está listo. Vosotros brillas. Las rosas brillan. El coche brilla. Conducid seguros, sonreíd sin parar, y guardad este momento para siempre. Nueva Vida está en vuestro corazón.',w:'❗ MÁXIMO 80 KM/H – LA SEGURIDAD ES AMOR',f:1}
  ],
  it:[

    {n:'2',t:'IL VOSTRO CAPOLAVORO 🎀',b:'Posiziona la ghirlanda sull\'auto prima di fissarla. Gioca, esplora la forma ideale: a V, asimmetrica, curva... Questo è il tuo momento per creare. Ogni angolo conta nella vostra storia.',w:''},
    {n:'3',t:'FISSAGGIO CON PRECISIONE ✋',b:'Inumidisci leggermente l\'interno delle ventose. Premi con fiducia al centro di ciascuna: attiverai il vuoto che ti sostiene. Fermezza, non forza. Risultato: sicurezza totale che rispetta la tua auto.',w:'❗ SOLO LA VENTOSA. I fiori sono delicati come le vostre emozioni.'},
    {n:'4',t:'ARRIVEDERCI SENZA TRACCE 🔓',b:'Quando la magia finisce, solleva delicatamente la linguetta trasparente. Il vuoto si rilascia all\'istante. Nessun graffio, nessun segno. La tua auto brilla come nuova, ma ora porta un ricordo indimenticabile.',w:'❗ NON TIRARE MAI il fiore o lo stelo. La perfezione non ferisce.'},
    {n:'5',t:'VIVETE OGNI ISTANTE! 🚗💨',b:'Tutto è pronto. Voi brillate. Le rose brillano. La vostra auto brilla. Guidate con prudenza, sorridete eternamente, e custodite questo momento per sempre. Nueva Vida è nel vostro cuore.',w:'❗ MASSIMO 80 KM/H – LA SICUREZZA È AMORE',f:1}
  ]
};
const ST={de:'Soporte contactar',en:'Contact Support',fr:'Contacter le Support',es:'Contactar Soporte',it:'Contatta il Supporto'};
let lang='de',cur=0;

function go(l){
  lang=l; cur=0;
  document.getElementById('introScreen').style.display='none';
  document.getElementById('carScreen').classList.add('active');
  render(); show(0);
}

function render(){
  const c=document.getElementById('slides'); c.innerHTML='';
  const pb=document.getElementById('progBar'); pb.innerHTML='';
  
  C[lang].forEach((s,i)=>{
    const seg=document.createElement('div');
    seg.className='seg';
    const fill=document.createElement('div');
    fill.className='fill';
    
    // Sincronización: animationend solo para no-final slides
    if(i < C[lang].length - 1) {
      fill.addEventListener('animationend', () => {
        if(i === cur) next();
      }, { once: false });
    }
    
    seg.appendChild(fill);
    pb.appendChild(seg);

    const d=document.createElement('div');
    d.className='slide';
    if(s.f){
      d.innerHTML=`
        <div class="step-num">${s.n}</div>
        <div class="divider"></div>
        <div class="final-title">${s.t}</div>
        ${s.b?`<div class="final-msg">${s.b}</div>`:''}
        ${s.w?`<div class="warn" style="margin-top:1rem;">${s.w}</div>`:''}
        <a href="mailto:info@nuevavida-ftv.de" class="support-btn">${ST[lang]}</a>
      `;
    } else {
      d.innerHTML=`
        <div class="step-num">${s.n}</div>
        <div class="divider"></div>
        <h2>${s.t}</h2>
        ${s.b?`<p>${s.b}</p>`:''}
        ${s.w?`<div class="warn">${s.w}</div>`:''}
      `;
    }
    c.appendChild(d);
  });
}

function show(i){
  document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.seg').forEach((s,j)=>{
    s.classList.remove('current','done');
    if(j<i) s.classList.add('done'); 
    else if(j===i) {
      void s.offsetWidth; // Fuerza reflow para reiniciar animación
      s.classList.add('current');
    }
  });
  const slides = document.querySelectorAll('.slide');
  if(slides[i]) slides[i].classList.add('active');
}

function next(){ 
  if(cur < C[lang].length - 1){ 
    cur++; 
    show(cur); 
  } 
}

function prev(){ 
  if(cur > 0){ 
    cur--; 
    show(cur); 
  } 
}

// Pausa táctil: mouse y touch
const carScreen = document.getElementById('carScreen');

carScreen.addEventListener('mousedown', () => {
  carScreen.classList.add('is-paused');
});

carScreen.addEventListener('mouseup', () => {
  carScreen.classList.remove('is-paused');
});

carScreen.addEventListener('mouseleave', () => {
  carScreen.classList.remove('is-paused');
});

carScreen.addEventListener('touchstart', (e) => {
  carScreen.classList.add('is-paused');
}, { passive: true });

carScreen.addEventListener('touchend', () => {
  carScreen.classList.remove('is-paused');
}, { passive: true });

carScreen.addEventListener('touchcancel', () => {
  carScreen.classList.remove('is-paused');
}, { passive: true });

</script>
</body>
</html>
